<div class="page">

  <h1 class="title">ONLINE STORE</h1>

  <div class="cats">

    <button
      class="catBtn"
      [class.active]="selectedCategoryId === 0"
      (click)="selectCategory(0)">
      All
    </button>

    @for (c of categories; track c.id) {
      <button
        class="catBtn"
        [class.active]="c.id === selectedCategoryId"
        (click)="selectCategory(c.id)">
        {{ c.name }}
      </button>
    }
  </div>

  @if (selectedCategoryId === null) {
    <p class="welcome">Select a category to see products</p>
  } @else {

    <app-product-list
      [products]="selectedProducts"
      (delete) = "onDelete($event)"></app-product-list>


  }
</div>
